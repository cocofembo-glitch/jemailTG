<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEmail - Авторизація</title>
    <!-- Зв'язок із маніфестом для скачування як PWA додаток -->
    <link rel="manifest" href="/manifest.json">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f0f1a; color: #e0e0e0; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-container { width: 100%; max-width: 420px; background: #161625; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #4a90e2; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; background: #252538; border: 1px solid #3a3a55; border-radius: 6px; color: white; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background-color: #4a90e2; color: white; }
        .btn-primary:hover { background-color: #357abd; }
        .btn-secondary { background-color: #2b2b3d; color: #bbb; }
        .btn-secondary:hover { background-color: #3a3a55; }
        .btn-success { background-color: #5cb85c; color: white; }
        .btn-install { background-color: #2b70c9; color: white; display: none; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(43,112,201,0.3); }
        .btn-install:hover { background-color: #2159a3; }
        .toggle-link { margin-top: 15px; display: inline-block; color: #4a90e2; text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        .lock-banner { background: #3d1418; border: 2px solid #ff4a4a; color: #ff8888; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="auth-container">
    <h1>JEmail ✉️</h1>

    <!-- Кнопка встановлення додатка (показується скриптом лише за можливості встановлення) -->
    <button id="installBtn" class="btn btn-install">
        📥 Встановити JEmail як додаток
    </button>

    {% if locked %}
    <!-- КРАСИВИЙ ЕКРАН БЛОКУВАННЯ, ЯКИЙ ТИ ПРОСИВ -->
    <div class="lock-banner">
        🛑 <strong>Зачекайте, будь ласка, йде оновлення системи — технічна перерва.</strong>
        <hr style="border: 0; border-top: 1px solid #ff4a4a; margin: 10px 0;">
        <p style="font-size: 0.85rem; color: #ccc; margin: 0 0 10px 0;">🔓 Вхід для адміністратора:</p>
        <input type="password" id="admin-unlock-pass" placeholder="Введіть код адміна" style="width: 100%; padding: 8px; background: #221215; border: 1px solid #ff4a4a; color: white; border-radius: 4px; box-sizing: border-box; text-align: center;">
        <button onclick="unlockSystemFromForm()" class="btn btn-success" style="padding: 8px; font-size: 0.9rem; margin-top: 8px;">Відкрити систему</button>
    </div>
    {% endif %}

    <div id="login-form">
        <h3>Вхід у систему</h3>
        <div class="form-group">
            <label>Логін або Email</label>
            <input type="text" id="login-username" placeholder="admin або ваш логін">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="login-password" placeholder="Ваш пароль">
        </div>
        <button onclick="handleLogin()" class="btn btn-primary">Увійти</button>
        
        {% if not locked %}
        <button onclick="handleGuestLogin()" class="btn btn-secondary">Увійти як Гість 👤</button>
        <span class="toggle-link" onclick="switchForm('register')">Створити акаунт</span>
        {% endif %}
    </div>

    <div id="register-form" style="display: none;">
        <h3>Реєстрація</h3>
        <div class="form-group">
            <label>Логін</label>
            <input type="text" id="reg-username">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="reg-password">
        </div>
        <button onclick="handleRegister()" class="btn btn-primary">Зареєструватися</button>
        <span class="toggle-link" onclick="switchForm('login')">Вже є акаунт? Увійти</span>
    </div>
</div>

<script>
function switchForm(type) {
    document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = type === 'register' ? 'block' : 'none';
}

function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();
    fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    }).then(res => res.json()).then(data => {
        if(data.success) window.location.href = '/';
        else alert(data.error);
    });
}

function unlockSystemFromForm() {
    const password = document.getElementById('admin-unlock-pass').value;
    fetch('/api/admin/toggle_system', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lock: false, password: password })
    }).then(res => res.json()).then(data => {
        if(data.success) { alert('Систему відкрито!'); window.location.reload(); }
        else alert(data.error);
    });
}

function handleRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value.trim();
    fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
    }).then(res => res.json()).then(data => {
        if(data.success) { alert('Успіх!'); switchForm('login'); }
        else alert(data.error);
    });
}

function handleGuestLogin() {
    fetch('/api/guest_login', { method: 'POST' }).then(res => res.json()).then(data => {
        if(data.success) window.location.href = '/';
    });
}

// --- Скрипт ініціалізації кнопки встановлення додатка (PWA) ---
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    // Зупиняємо стандартну системну плашку браузера
    e.preventDefault();
    deferredPrompt = e;
    // Показуємо нашу красиву кнопку на сторінці
    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`Вибір користувача: ${outcome}`);
        deferredPrompt = null;
        installBtn.style.display = 'none';
    }
});

window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
    console.log('JEmail встановлено успішно!');
});
</script>
</body>
</html>
